project:
  name: aura-pi

video:
  width: 1280
  height: 720
  fps: 25
  source: opencv
  device_index: 0
  fullscreen_preview: true
  window_name: Aura Pi

detector:
  type: motion_person
  min_area: 5000
  history: 250
  var_threshold: 64
  learning_rate: 0.0001

tracker:
  max_distance: 140
  max_missing_frames: 150

audio:
  enabled: true
  device: TX-6
  sample_rate: 48000
  block_size: 512

render:
  background_dim: 0.45
  aura_radius: 120
  aura_alpha: 0.58
  trail: false
  show_labels: false

recording:
  enabled: true
  output_path: output/session_%Y%m%d_%H%M%S.mp4
  ffmpeg_bin: ffmpeg
  video_codec: libx264
  pixel_format: yuv420p
  crf: 20
  preset: veryfast
  audio_enabled: true
  audio_input_format: avfoundation
  audio_input_device: 0

archive_recording:
  enabled: true
  output_path: output/archive_%Y%m%d_%H%M%S.mp4
  audio_enabled: true
