project:
  name: aura-pi

video:
  width: 960
  height: 540
  fps: 20
  source: opencv
  device_index: 0
  fullscreen_preview: true
  window_name: Aura Pi Hailo

detector:
  type: hailo_person
  min_area: 5000
  history: 250
  var_threshold: 64
  learning_rate: 0.0001
  interval: 3
  score_threshold: 0.0
  max_detections: 12
  target_label: "*"
  model_path: /usr/local/hailo/resources/models/hailo8/scrfd_10g.hef
  labels_path:

tracker:
  max_distance: 140
  max_missing_frames: 150

audio:
  enabled: true
  device: 1
  sample_rate: 48000
  block_size: 512

render:
  background_dim: 0.45
  aura_radius: 120
  aura_alpha: 0.58
  trail: false
  show_labels: false
  debug_boxes: true
  aura_enabled: false
  audio_threshold: 0.004
  audio_scale: 20.0
  space_warp: true
  warp_strength: 0.65

recording:
  enabled: true
  output_path: /media/commento/Extreme Pro/aura/session_%Y%m%d_%H%M%S.mp4
  ffmpeg_bin: ffmpeg
  video_codec: libx264
  pixel_format: yuv420p
  crf: 20
  preset: veryfast
  audio_enabled: true
  audio_input_format: alsa
  audio_input_device: default

archive_recording:
  enabled: true
  output_path: /media/commento/Extreme Pro/aura/archive_%Y%m%d_%H%M%S.mp4
  audio_enabled: true
